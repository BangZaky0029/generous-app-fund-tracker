<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Transparent Fund Tracker - Daftar</title>

          extend: {

                    "on-surface": "#dee5ff",
                    "surface-container-highest": "#192540",
                    "tertiary-container": "#00dcfd",
                    "outline": "#6d758c",
                    "surface": "#060e20",
                    "secondary-container": "#3a485c",
                    "inverse-surface": "#faf8ff",
                    "error-dim": "#d7383b",
                    "on-tertiary-container": "#004955",
                    "on-tertiary-fixed-variant": "#005360",
                    "on-secondary-fixed-variant": "#4e5c71",
                    "inverse-on-surface": "#4d556b",
                    "on-secondary-fixed": "#324054",
                    "on-background": "#dee5ff",
                    "on-surface-variant": "#a3aac4",
                    "surface-tint": "#69f6b8",
                    "surface-container": "#0f1930",
                    "secondary": "#d5e3fd",
                    "secondary-fixed": "#d5e3fd",
                    "surface-bright": "#1f2b49",
                    "on-secondary": "#455367",
                    "primary-fixed-dim": "#58e7ab",
                    "surface-dim": "#060e20",
                    "on-primary": "#005a3c",
                    "background": "#060e20",
                    "secondary-fixed-dim": "#c7d5ee",
                    "on-tertiary": "#005360",
                    "error-container": "#9f0519",
                    "on-error-container": "#ffa8a3",
                    "primary-container": "#06b77f",
                    "tertiary": "#77e6ff",
                    "inverse-primary": "#006d4a",
                    "outline-variant": "#40485d",
                    "surface-container-lowest": "#000000",
                    "on-tertiary-fixed": "#00343c",
                    "tertiary-dim": "#00cdeb",
                    "primary-fixed": "#69f6b8",
                    "surface-variant": "#192540",
                    "secondary-dim": "#c7d5ee",
                    "on-primary-fixed": "#00452d",
                    "primary": "#69f6b8",
                    "on-primary-fixed-variant": "#006544",
                    "primary-dim": "#58e7ab",
                    "surface-container-low": "#091328",
                    "tertiary-fixed": "#00dcfd",
                    "surface-container-high": "#141f38",
                    "on-error": "#490006",

                    "error": "#ff716c"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      .glass-panel {
        background: rgba(25, 37, 64, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .specular-highlight {
        border: 1px solid rgba(64, 72, 93, 0.15);
      }
      .bg-abstract {
        background: radial-gradient(circle at 20% 20%, rgba(105, 246, 184, 0.05) 0%, transparent 40%),
                    radial-gradient(circle at 80% 80%, rgba(0, 220, 253, 0.05) 0%, transparent 40%);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      /* Hide radio but keep accessible */
      .role-radio:checked + label {
        @apply bg-primary/20 border-primary text-primary;
      }
    </style>
<style>
    body {
      min-height: max(960px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6 overflow-x-hidden relative">
<!-- Background Decoration -->
<div class="absolute inset-0 z-0 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-tertiary/10 rounded-full blur-[120px]"></div>
<img class="absolute inset-0 w-full h-full object-cover opacity-20 mix-blend-overlay grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD9hLiuwheBwQ_O3-qPl0-oauSNcoTeRG6VbU63lZJPcMVRH7mJILOKzzws1kj7CHM7CZAaYFQX8qccXHglf4la2W3m_UIlmRdL8V5OqZ89FPI9jPk9JNFIb7oTUpnQVXSmKJdmJm_c4Yj7zn9NNpMuw82-xcrFlwrE1MB5FNbaxH0Rq8KhuFZ3340mXJ5VBPWsB0_t5-u6BVlkpUe2BbXeSYv5P3bxmF5lKmfQ42APXwBnxGeTBx5c1bAKfNCWdjpqAZ0VF0lY9-g"/>
</div>
<!-- Auth Container -->
<main class="relative z-10 w-full max-w-md my-8">
<!-- Logo Area -->
<header class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl glass-panel specular-highlight mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface">Transparent Fund Tracker</h1>
<p class="text-on-surface-variant mt-2 font-medium">Buat akun untuk mulai berdampak.</p>
</header>
<!-- Glass Registration Card -->
<div class="glass-panel specular-highlight rounded-xl p-8 shadow-[0_20px_40px_rgba(0,0,0,0.4)] transition-all duration-300">
<div class="flex gap-4 mb-8">
<button class="flex-1 pb-3 text-sm font-bold border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors">Masuk</button>
<button class="flex-1 pb-3 text-sm font-bold border-b-2 border-primary text-primary transition-colors">Daftar</button>
</div>
<form class="space-y-5">
<!-- Role Selection -->
<div class="space-y-3">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Pilih Peran Anda</label>
<div class="grid grid-cols-2 gap-3">
<div class="relative">
<input checked="" class="role-radio hidden" id="role-donatur" name="role" type="radio" value="donatur"/>
<label class="flex flex-col items-center justify-center p-4 rounded-lg border border-outline-variant/30 bg-surface-container-lowest/50 cursor-pointer transition-all hover:bg-surface-container-lowest" for="role-donatur">
<span class="material-symbols-outlined mb-1" data-icon="volunteer_activism">volunteer_activism</span>
<span class="text-xs font-bold uppercase tracking-wide">Donatur</span>
</label>
</div>
<div class="relative">
<input class="role-radio hidden" id="role-admin" name="role" type="radio" value="admin"/>
<label class="flex flex-col items-center justify-center p-4 rounded-lg border border-outline-variant/30 bg-surface-container-lowest/50 cursor-pointer transition-all hover:bg-surface-container-lowest" for="role-admin">
<span class="material-symbols-outlined mb-1" data-icon="admin_panel_settings">admin_panel_settings</span>
<span class="text-xs font-bold uppercase tracking-wide">Admin</span>
</label>
</div>
</div>
</div>
<!-- Input Nama Lengkap -->
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Nama Lengkap</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="person">person</span>
</div>
<input class="w-full bg-surface-container-lowest border-0 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 specular-highlight transition-all" placeholder="Nama Lengkap" type="text"/>
</div>
</div>
<!-- Input Email -->
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border-0 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 specular-highlight transition-all" placeholder="nama@email.com" type="email"/>
</div>
</div>
<!-- Input Password -->
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1">Kata Sandi</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border-0 rounded-lg py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 specular-highlight transition-all" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-on-surface" data-icon="visibility_off">visibility_off</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="space-y-4 pt-4">
<button class="w-full py-4 bg-gradient-to-r from-primary-container to-primary rounded-lg text-on-primary-container font-bold text-lg shadow-[0_10px_20px_rgba(105,246,184,0.2)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Daftar Sekarang
                        <span class="material-symbols-outlined" data-icon="app_registration">app_registration</span>
</button>
<div class="relative py-2">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/30"></div></div>
<div class="relative flex justify-center text-xs uppercase"><span class="bg-surface-container/60 px-4 text-outline font-bold tracking-widest backdrop-blur-sm">Atau daftar dengan</span></div>
</div>
<div class="flex gap-4">
<button class="flex-1 glass-panel specular-highlight p-4 rounded-lg flex items-center justify-center hover:bg-white/10 transition-colors" type="button">
<img class="w-6 h-6 grayscale hover:grayscale-0 transition-all" data-alt="Google identity icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuADacYbcGw0H18ShspPwiFqgbYUcEoh_8e71vGjOeMbK0p2VIsTUYWPlxEidY2E9EmWz6SdMEZLj38ktO8WEcunFDO6ZHERRYBUw_GuIpfB7EOCqv1mVmSfKbO32gWwBP4GrfWQMlPZoonxgngunNDWyMVBTJnlLbS6t1NXH7IRKPNTJ0x92gSWprv5l5IAc85kGy86aVaDpz7wZ5bPWW9zuoOVhzIESU8qXhupfByfLhj3GP2snY7J-U19PRr7qgy7ZYn0oz-ptIE"/>
</button>
</div>
</div>
</form>
</div>
<!-- Footer Note -->
<p class="text-center mt-8 text-on-surface-variant text-sm">
            Sudah memiliki akun? 
            <button class="text-primary font-bold hover:underline">Masuk</button>
</p>
</main>
<script>
    // Simple toggle logic visual representation
    document.querySelectorAll('.role-radio').forEach(radio => {
      radio.addEventListener('change', (e) => {
        document.querySelectorAll('.role-radio + label').forEach(label => {
          label.classList.remove('bg-primary/20', 'border-primary', 'text-primary');
        });
        if (e.target.checked) {
          e.target.nextElementSibling.classList.add('bg-primary/20', 'border-primary', 'text-primary');
        }
      });
    });
  </script>
</body></html>
