<!DOCTYPE html>

<html class="dark" lang="id"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(25, 37, 64, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#192540]/60 backdrop-blur-3xl flex justify-between items-center px-6 h-16 w-full border-b border-[#40485d]/15 shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/30">
<img alt="Admin Profile" data-alt="close up professional headshot of a financial administrator with soft studio lighting and dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRGZAHKH17jWZt8C-NeDBmHouCvdLAJ3Q57zgg_-hJ-Iw5qYCmyj7KQDgxX_rd9DRI2amLxmvmcUByyHPXLCuXCyJLq3rH7glTIN8c0xp0zkDs6Vp0sVFC9O512GTqWYUtD4GjJzOJ7oN4fB3IFx5XZoX5wntyPbpY9rU9o7c94DePpdhLhzYqY-VvQwpHZ6IeInFB-EGau1n8w73_EX-orG9j2-8eNFXX5NGfCeCgY0C5qpNPZQoc6eXug-yf12yws0HjW-VjCMo"/>
</div>
<h1 class="font-headline uppercase tracking-widest text-sm font-bold text-[#69f6b8]">Input Pengeluaran</h1>
</div>
<button class="material-symbols-outlined text-[#69f6b8] hover:bg-[#ffffff]/10 transition-colors p-2 rounded-full active:scale-95 duration-200" data-icon="notifications">notifications</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Hero Section: Total Overview (Minimalist) -->
<div class="mb-10 text-center">
<p class="text-on-surface-variant font-label text-xs tracking-widest uppercase mb-2">Input Transaksi Baru</p>
<h2 class="font-headline text-2xl font-extrabold text-on-surface">Digital Command Center</h2>
</div>
<!-- Main Bento Form Card -->
<div class="bg-surface-container rounded-xl p-8 shadow-2xl relative overflow-hidden border border-outline-variant/15">
<!-- Decorative Glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 blur-[80px] rounded-full"></div>
<form class="space-y-8 relative z-10">
<!-- Amount Input -->
<div class="space-y-3">
<label class="font-headline text-sm font-bold text-primary tracking-wide uppercase">Nominal Transaksi</label>
<div class="relative group">
<span class="absolute left-6 top-1/2 -translate-y-1/2 text-on-surface-variant font-headline font-bold text-xl">Rp</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-lg py-6 pl-16 pr-6 text-3xl font-headline font-extrabold text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-surface-variant" placeholder="0" type="number"/>
</div>
</div>
<!-- Category Selector -->
<div class="space-y-3">
<label class="font-headline text-sm font-bold text-primary tracking-wide uppercase">Kategori</label>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 bg-primary-container text-on-primary-container py-4 rounded-lg font-bold text-sm transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-lg" data-icon="inventory_2">inventory_2</span>
                            Logistik
                        </button>
<button class="flex items-center justify-center gap-2 bg-surface-container-high text-on-surface-variant py-4 rounded-lg font-bold text-sm hover:bg-surface-variant transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-lg" data-icon="medical_services">medical_services</span>
                            Medis
                        </button>
<button class="flex items-center justify-center gap-2 bg-surface-container-high text-on-surface-variant py-4 rounded-lg font-bold text-sm hover:bg-surface-variant transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-lg" data-icon="bolt">bolt</span>
                            Operasional
                        </button>
<button class="flex items-center justify-center gap-2 bg-surface-container-high text-on-surface-variant py-4 rounded-lg font-bold text-sm hover:bg-surface-variant transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-lg" data-icon="more_horiz">more_horiz</span>
                            Lainnya
                        </button>
</div>
</div>
<!-- Description -->
<div class="space-y-3">
<label class="font-headline text-sm font-bold text-primary tracking-wide uppercase">Deskripsi</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-lg p-4 text-on-surface font-body focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none resize-none placeholder:text-on-surface-variant/40" placeholder="Keterangan pengeluaran..." rows="3"></textarea>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-[#06b77f] to-[#69f6b8] text-[#002919] py-5 rounded-lg font-headline font-bold text-lg flex items-center justify-center gap-3 shadow-[0_10px_30px_rgba(105,246,184,0.2)] active:scale-95 transition-transform" type="submit">
                        Simpan &amp; Lanjutkan ke Kamera
                        <span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
</button>
<p class="text-center text-on-surface-variant/60 text-xs mt-4 font-label">Verifikasi struk akan dilakukan di langkah berikutnya.</p>
</div>
</form>
</div>
<!-- Secondary Info Cards (Bento Style) -->
<div class="grid grid-cols-2 gap-4 mt-6">
<div class="bg-surface-container-low p-5 rounded-lg border border-outline-variant/10">
<span class="material-symbols-outlined text-primary mb-3" data-icon="account_balance_wallet">account_balance_wallet</span>
<p class="text-xs text-on-surface-variant font-label uppercase tracking-tighter">Sisa Anggaran</p>
<p class="font-headline font-bold text-on-surface">Rp45.200.000</p>
</div>
<div class="bg-surface-container-low p-5 rounded-lg border border-outline-variant/10">
<span class="material-symbols-outlined text-tertiary mb-3" data-icon="history">history</span>
<p class="text-xs text-on-surface-variant font-label uppercase tracking-tighter">Input Terakhir</p>
<p class="font-headline font-bold text-on-surface">Logistik - 2j lalu</p>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-full bg-[#192540]/60 backdrop-blur-3xl flex justify-around items-center px-4 py-2 z-50 border border-[#40485d]/15 shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<a class="flex flex-col items-center justify-center text-slate-400 p-2 hover:text-[#69f6b8] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Inter'] text-[10px] font-medium">Dashboard</span>
</a>
<!-- Active State: Input -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#06b77f] to-[#69f6b8] text-[#060e20] rounded-full w-12 h-12 shadow-lg active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="hidden">Input</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 p-2 hover:text-[#69f6b8] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="photo_library">photo_library</span>
<span class="font-['Inter'] text-[10px] font-medium">Gallery</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 p-2 hover:text-[#69f6b8] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[10px] font-medium">Settings</span>
</a>
</nav>
</body></html>
